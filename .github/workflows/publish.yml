name: Publish to npm

on:
  push:
    tags:
      - 'v*'
      - 'lobe-v*'
      - 'mdev-v*'
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: root
        type: choice
        options:
          - lobe
          - mdev
          - root
      bump:
        description: Version bump level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 解析发布目标与版本策略 ──────────────────────────
      - name: Resolve publish targets
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PACKAGE="${{ inputs.package }}"
            BUMP="${{ inputs.bump }}"
          else
            TAG="${{ github.ref_name }}"
            BUMP=""
            case "$TAG" in
              lobe-v*) PACKAGE="lobe" ;;
              mdev-v*) PACKAGE="mdev" ;;
              v*)      PACKAGE="root" ;;
              *)       echo "Unknown tag: $TAG"; exit 1 ;;
            esac
          fi
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      # ── 构建（workflow_dispatch 带版本升级，tag 触发不升级） ──
      - name: Build and publish
        shell: bash
        run: |
          PACKAGE="${{ steps.resolve.outputs.package }}"
          BUMP="${{ steps.resolve.outputs.bump }}"

          # 构建命令
          CMD="echo 'Package: $PACKAGE'"
          if [[ "$PACKAGE" == "root" ]]; then
            if [[ -n "$BUMP" ]]; then
              CMD="$CMD && npm version $BUMP --no-git-tag-version"
            fi
          elif [[ "$PACKAGE" == "lobe" ]]; then
            CMD="$CMD && pnpm tsx build.ts lobe"
            if [[ -n "$BUMP" ]]; then
              CMD="$CMD && cd icons/lobe && npm version $BUMP --no-git-tag-version"
            fi
          elif [[ "$PACKAGE" == "mdev" ]]; then
            CMD="$CMD && pnpm tsx build.ts mdev"
            if [[ -n "$BUMP" ]]; then
              CMD="$CMD && cd icons/mdev && npm version $BUMP --no-git-tag-version"
            fi
          fi

          echo "Running: $CMD"
          eval "$CMD"

      # ── 提交版本变更（仅 workflow_dispatch） ────────────
      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          PACKAGE="${{ steps.resolve.outputs.package }}"
          if [[ "$PACKAGE" == "root" ]]; then
            PKG_NAME="$(node -p "require('./package.json').name")"
            VERSION="$(node -p "require('./package.json').version")"
            git add package.json
          elif [[ "$PACKAGE" == "lobe" ]]; then
            PKG_NAME="$(node -p "require('./icons/lobe/package.json').name")"
            VERSION="$(node -p "require('./icons/lobe/package.json').version")"
            git add icons/lobe/*
          elif [[ "$PACKAGE" == "mdev" ]]; then
            PKG_NAME="$(node -p "require('./icons/mdev/package.json').name")"
            VERSION="$(node -p "require('./icons/mdev/package.json').version")"
            git add icons/mdev/*
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(release): ${PKG_NAME}@v${VERSION} [skip ci]"
            git push
          fi

      # ── 发布到 npm ─────────────────────────────────────
      - name: Publish @llmicons-json/lobe
        working-directory: ./icons/lobe
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: steps.resolve.outputs.package == 'lobe'

      - name: Publish @llmicons-json/mdev
        working-directory: ./icons/mdev
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: steps.resolve.outputs.package == 'mdev'

      - name: Publish llmicons (root)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: steps.resolve.outputs.package == 'root'

      # ── 创建 Git Tag（仅 workflow_dispatch） ────────────
      - name: Create Git tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          PACKAGE="${{ steps.resolve.outputs.package }}"
          if [[ "$PACKAGE" == "root" ]]; then
            TAG="v$(node -p "require('./package.json').version")"
          elif [[ "$PACKAGE" == "lobe" ]]; then
            TAG="lobe-v$(node -p "require('./icons/lobe/package.json').version")"
          elif [[ "$PACKAGE" == "mdev" ]]; then
            TAG="mdev-v$(node -p "require('./icons/mdev/package.json').version")"
          fi
          git tag "$TAG"
          git push origin "$TAG"